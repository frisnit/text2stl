app_name: Text2STL
app_title: Générateur gratuit de texte 3D imprimable
app_subtitle: Générer du texte 3D imprimable en un clic
index_page:
  title: Générer du texte 3D imprimable n’a jamais été aussi simple !
  list:
    font:
      dt: Police personnalisée
      dd: Utilisez une police parmi plus de 1000 polices Google ou utilisez la vôtre.
    shape:
      dt: Forme personnalisée
      dd: Choisissez parmi plusieurs formes (avec ou sans support, texte inversé).
    text:
      dt: Texte personnalisé
      dd: Vous choisissez le texte à imprimer.
    settings:
      dt: Réglages personnalisés
      dd: Affinez les réglages, taille de police, hauteur du support et/ou du texte...
    stl:
      dt: Fichier STL
      dd: Exportez votre fichier STL en un clic !
  image_alt: Texte 3D imprimable
  button: Commencez...
